<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Menongue Educa Banner</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f2f2f2;
}

.banner {
  width: 1024px;
  height: 500px;
  background: linear-gradient(135deg, #0b3d91, #1e88e5);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border-radius: 20px;
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
  position: relative;
  overflow: hidden;
}

/* efeitos decorativos */
.banner::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
  top: -200px;
  left: -200px;
}

.banner::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: rgba(255,215,0,0.08);
  border-radius: 50%;
  bottom: -150px;
  right: -150px;
}

/* LOGO */
.logo {
  width: 120px;
  height: 120px;
  object-fit: contain;
  border-radius: 20px;
  margin-bottom: 20px;
  z-index: 2;
  box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
}

/* Título */
.title {
  font-size: 60px;
  font-weight: bold;
  z-index: 2;
}

/* Subtítulo */
.subtitle {
  font-size: 22px;
  margin-top: 15px;
  max-width: 800px;
  z-index: 2;
}
</style>
</head>

<body>

<div class="banner">

  <!-- LOGO -->
  <img class="logo" src="logo.png" alt="Menongue Educa Logo">

  <!-- TÍTULO -->
  <div class="title">Menongue Educa</div>

  <!-- SUBTÍTULO -->
  <div class="subtitle">
    Plataforma Educacional para Estudantes e Professores em Angola<br>
    Acesso a livros, conteúdos escolares e aprendizagem digital
  </div>

</div>

</body>
</html>
